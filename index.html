<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>বাউফল ইফতার ও বিরিয়ানি ফাইন্ডার 🌙</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #16a34a; /* Green matching your image */
            --primary-dark: #15803d;
            --accent: #f97316; /* Orange for FAB */
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: var(--bg-light); }

        /* Full Screen Loading */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 0.5s ease;
        }
        #loading-screen img { width: 100px; animation: bounce 2s infinite; margin-bottom: 20px; }
        #loading-screen h2 { color: var(--accent); font-size: 22px; font-weight: 700; }
        #loading-screen p { color: var(--text-muted); font-size: 16px; }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* Top Bar Overlay */
        .top-bar {
            position: absolute; top: 15px; left: 15px; right: 15px; z-index: 1000;
            display: flex; justify-content: space-between; gap: 10px;
        }
        .logo-btn {
            background: white; padding: 10px 15px; border-radius: 30px;
            display: flex; align-items: center; gap: 8px; font-weight: 700; color: var(--primary-dark);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #e2e8f0;
        }
        .logo-btn i { color: var(--accent); font-size: 18px; }
        
        .live-btn {
            background: white; padding: 10px 15px; border-radius: 30px;
            display: flex; align-items: center; gap: 6px; font-weight: 600; color: var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #e2e8f0;
        }
        .live-btn i { animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .tag-info {
            position: absolute; top: 70px; left: 15px;
            background: var(--primary-dark); color: white; padding: 5px 15px;
            border-radius: 20px; font-size: 13px; font-weight: 600;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); z-index: 1000;
        }

        /* Instructions Toast */
        #instruction-toast {
            position: absolute; top: 110px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 10px 20px;
            border-radius: 30px; font-size: 14px; z-index: 2000; display: none;
            white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Map Container */
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* Floating Action Button (FAB) */
        .fab {
            position: absolute; bottom: 45vh; right: 20px; z-index: 1000;
            width: 60px; height: 60px; border-radius: 50%; background: var(--accent);
            color: white; border: none; font-size: 28px; font-weight: 300;
            box-shadow: 0 6px 15px rgba(234, 88, 12, 0.4); cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.2s;
        }
        .fab:active { transform: scale(0.95); }
        .fab.active { background: var(--text-dark); transform: rotate(45deg); }

        /* Bottom Sheet (App Style) */
        .bottom-sheet {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 40vh;
            background: var(--bg-light); z-index: 1000;
            border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .sheet-header {
            background: var(--primary); color: white; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .sheet-header h3 { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        
        .sheet-content {
            flex: 1; overflow-y: auto; padding: 15px;
        }

        /* Empty State */
        .empty-state {
            text-align: center; color: var(--text-muted); padding-top: 20px;
        }
        .empty-state i { font-size: 40px; color: #cbd5e1; margin-bottom: 10px; }
        
        /* Spot Card */
        .spot-card {
            background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .spot-info h4 { font-size: 16px; color: var(--text-dark); margin-bottom: 5px; }
        .spot-info p { font-size: 13px; color: var(--text-muted); }
        .spot-badge { background: #fef3c7; color: #b45309; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }

        /* Modal Form (Add Spot) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 3000; display: none;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            background: white; width: 100%; max-width: 400px; border-radius: 20px;
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .modal-header h3 { font-size: 18px; color: var(--primary-dark); }
        .close-btn { background: none; border: none; font-size: 20px; color: var(--text-muted); cursor: pointer; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: 600; color: var(--text-dark); }
        .form-control { width: 100%; padding: 10px 15px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 15px; }
        .form-control:focus { outline: none; border-color: var(--primary); }
        
        .submit-btn {
            width: 100%; background: var(--primary); color: white; padding: 12px;
            border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer;
        }

        /* Marker CSS */
        .custom-marker {
            background: white; border-radius: 50%; border: 3px solid var(--primary);
            display: flex; justify-content: center; align-items: center;
            font-size: 16px; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <h2 style="font-size: 40px;">🍛</h2>
        <h2>ইফতার ম্যাপ লোড হচ্ছে...</h2>
        <p>বাউফলে বিরিয়ানি খোঁজা হচ্ছে</p>
    </div>

    <!-- UI Overlay -->
    <div class="top-bar">
        <div class="logo-btn">
            <i class="fas fa-mosque"></i> বিরিয়ানি দিবে
        </div>
        <div class="live-btn">
            <i class="fas fa-wifi"></i> সরাসরি
        </div>
    </div>
    
    <div class="tag-info" id="spot-counter">
        <i class="fas fa-map-marker-alt"></i> আজকের স্পট: ০ টি
    </div>

    <!-- Instructions Toast -->
    <div id="instruction-toast">
        <i class="fas fa-hand-pointer"></i> ম্যাপে যে স্থানে বিরিয়ানি দিচ্ছে সেখানে ট্যাপ করুন
    </div>

    <!-- Main Map -->
    <div id="map"></div>

    <!-- Add Spot Button (FAB) -->
    <button class="fab" id="add-fab">
        <i class="fas fa-plus"></i>
    </button>

    <!-- Bottom Sheet (List) -->
    <div class="bottom-sheet">
        <div class="sheet-header">
            <h3><i class="fas fa-clock"></i> আজকের সক্রিয় স্পট</h3>
            <span style="font-size: 12px; opacity: 0.8;">ম্যাপে ট্যাপ করুন</span>
        </div>
        <div class="sheet-content" id="spot-list">
            <!-- Data will load here -->
            <div class="empty-state">
                <i class="fas fa-mosque"></i>
                <p>আজকে এখনো কোনো স্পট নেই<br>প্রথম স্পট যোগ করুন!</p>
            </div>
        </div>
        <div style="text-align: center; padding: 5px; font-size: 11px; color: #94a3b8; background: white;">
            made for Bauphal | by Taohid
        </div>
    </div>

    <!-- Add Spot Modal -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-map-pin"></i> নতুন স্পট যোগ করুন</h3>
                <button class="close-btn" id="close-modal"><i class="fas fa-times"></i></button>
            </div>
            
            <form id="add-spot-form">
                <input type="hidden" id="lat">
                <input type="hidden" id="lng">
                
                <div class="form-group">
                    <label>মসজিদ বা এলাকার নাম</label>
                    <input type="text" id="spot-name" class="form-control" placeholder="যেমন: বাউফল কেন্দ্রীয় জামে মসজিদ" required>
                </div>
                
                <div class="form-group">
                    <label>কী দেওয়া হবে?</label>
                    <select id="spot-item" class="form-control" required>
                        <option value="বিরিয়ানি">বিরিয়ানি 🍛</option>
                        <option value="তেহারি">তেহারি 🍲</option>
                        <option value="ইফতার বক্স">ইফতার বক্স 🍱</option>
                        <option value="অন্যান্য">অন্যান্য 🧃</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>বিস্তারিত ঠিকানা (ঐচ্ছিক)</label>
                    <input type="text" id="spot-address" class="form-control" placeholder="যেমন: বাউফল বাজার">
                </div>
                
                <button type="submit" class="submit-btn" id="submit-btn">যুক্ত করুন</button>
            </form>
        </div>
    </div>

    <!-- Leaflet & Firebase Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Your Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyD_HBGuQSh_GzqrHqHbgdaoBikLZsK3Qqs",
            authDomain: "new-all-f99f7.firebaseapp.com",
            databaseURL: "https://new-all-f99f7-default-rtdb.firebaseio.com",
            projectId: "new-all-f99f7",
            storageBucket: "new-all-f99f7.firebasestorage.app",
            messagingSenderId: "1069748173900",
            appId: "1:1069748173900:web:158d6336c0f4628133c8e9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- MAP INITIALIZATION ---
        // কোনো লিমিটেশন ছাড়া ফ্রি ম্যাপ, তবে ওপেন হবে বাউফলের ঠিকানায়
        const map = L.map('map', {
            center: [22.7303, 90.5392], // বাউফলের লোকেশন
            zoom: 13,
            zoomControl: false // ম্যাপের জুম বাটন হাইড করা হয়েছে ডিজাইনের জন্য
        });

        // एकदम स्पष्ट Google Maps স্টাইল ব্যবহার করা হয়েছে (রাস্তাঘাট ক্লিয়ার দেখার জন্য)
        L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
            attribution: '© Google Maps'
        }).addTo(map);

        // --- ADDING SPOT LOGIC (UGC) ---
        const fab = document.getElementById('add-fab');
        const toast = document.getElementById('instruction-toast');
        const modal = document.getElementById('add-modal');
        const closeModalBtn = document.getElementById('close-modal');
        const form = document.getElementById('add-spot-form');
        let isAddingMode = false;

        fab.addEventListener('click', () => {
            isAddingMode = !isAddingMode;
            if (isAddingMode) {
                fab.classList.add('active');
                fab.innerHTML = '<i class="fas fa-times"></i>';
                toast.style.display = 'block';
                map.getContainer().style.cursor = 'crosshair';
            } else {
                cancelAddMode();
            }
        });

        function cancelAddMode() {
            isAddingMode = false;
            fab.classList.remove('active');
            fab.innerHTML = '<i class="fas fa-plus"></i>';
            toast.style.display = 'none';
            map.getContainer().style.cursor = '';
        }

        // Map Click Event for Adding Spot
        map.on('click', function(e) {
            if (!isAddingMode) return;
            
            // Set coordinates in form
            document.getElementById('lat').value = e.latlng.lat;
            document.getElementById('lng').value = e.latlng.lng;
            
            // Open Modal
            modal.style.display = 'flex';
            cancelAddMode();
        });

        closeModalBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        // Submit Form to Firebase
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.innerText = 'যোগ করা হচ্ছে...';
            submitBtn.disabled = true;

            try {
                await addDoc(collection(db, "bauphal_spots"), {
                    name: document.getElementById('spot-name').value,
                    item: document.getElementById('spot-item').value,
                    address: document.getElementById('spot-address').value || 'বাউফল',
                    lat: parseFloat(document.getElementById('lat').value),
                    lng: parseFloat(document.getElementById('lng').value),
                    isGiving: true,
                    createdAt: serverTimestamp()
                });
                
                modal.style.display = 'none';
                form.reset();
                alert('ধন্যবাদ! আপনার স্পটটি সফলভাবে ম্যাপে যোগ করা হয়েছে।');
            } catch (error) {
                alert('দুঃখিত, কোনো সমস্যা হয়েছে। আবার চেষ্টা করুন।');
            } finally {
                submitBtn.innerText = 'যুক্ত করুন';
                submitBtn.disabled = false;
            }
        });

        // --- FETCH & DISPLAY DATA ---
        let markersData = [];
        const spotListDiv = document.getElementById('spot-list');
        const counterDiv = document.getElementById('spot-counter');
        const loadingScreen = document.getElementById('loading-screen');

        onSnapshot(collection(db, "bauphal_spots"), (snapshot) => {
            // Remove Loading Screen on first load
            loadingScreen.style.opacity = '0';
            setTimeout(() => loadingScreen.style.display = 'none', 500);

            // Clear old markers & list
            markersData.forEach(m => map.removeLayer(m));
            markersData = [];
            spotListDiv.innerHTML = '';

            let count = 0;

            if (snapshot.empty) {
                spotListDiv.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-mosque"></i>
                        <p>আজকে এখনো কোনো স্পট নেই<br>আপনিই প্রথম স্পটটি যোগ করুন!</p>
                    </div>`;
                counterDiv.innerHTML = `<i class="fas fa-map-marker-alt"></i> আজকের স্পট: ০ টি`;
                return;
            }

            snapshot.forEach((doc) => {
                const spot = doc.data();
                count++;

                // Add Marker to Map
                const iconHtml = spot.item.includes('বিরিয়ানি') ? '🍛' : '🕌';
                const customIcon = L.divIcon({
                    className: '',
                    html: `<div class="custom-marker" style="width: 30px; height: 30px;">${iconHtml}</div>`,
                    iconSize: [30, 30], iconAnchor: [15, 30]
                });

                const marker = L.marker([spot.lat, spot.lng], { icon: customIcon }).addTo(map);
                marker.bindPopup(`<b>${spot.name}</b><br>${spot.item} দেওয়া হবে`);
                markersData.push(marker);

                // Add to Bottom Sheet List
                const card = document.createElement('div');
                card.className = 'spot-card';
                card.innerHTML = `
                    <div class="spot-info">
                        <h4>${iconHtml} ${spot.name}</h4>
                        <p><i class="fas fa-map-pin"></i> ${spot.address}</p>
                    </div>
                    <div class="spot-badge">${spot.item}</div>
                `;
                
                // Click card to zoom on map
                card.addEventListener('click', () => {
                    map.flyTo([spot.lat, spot.lng], 16, { animate: true, duration: 1 });
                    setTimeout(() => marker.openPopup(), 1000);
                });

                spotListDiv.appendChild(card);
            });

            counterDiv.innerHTML = `<i class="fas fa-map-marker-alt"></i> আজকের স্পট: ${count} টি`;
        });
    </script>
</body>
</html>
